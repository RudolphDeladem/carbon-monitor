<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Carbon Monitor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&family=Space+Mono&display=swap');

  :root {
    --bg:      #080d1a;
    --surface: #0e1525;
    --border:  #1a2540;
    --text:    #dde3f0;
    --muted:   #556080;
    --co2:     #38bdf8;
    --temp:    #fb923c;
    --hum:     #34d399;
    --co:      #c084fc;
    --good:    #22c55e;
    --warn:    #f59e0b;
    --danger:  #ef4444;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    padding: 24px 20px 40px;
    max-width: 960px;
    margin: 0 auto;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--good);
    animation: pulse 2s infinite;
  }
  .logo-dot.offline { background: var(--danger); animation: none; }
  h1 { font-size: 1rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
  #last-seen {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
  }

  /* ── Alert banner ── */
  #alert-banner {
    display: none;
    align-items: flex-start;
    gap: 10px;
    background: rgba(239,68,68,0.08);
    border: 1px solid var(--danger);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 20px;
    font-size: 0.85rem;
    color: var(--danger);
    font-weight: 500;
    animation: flashBorder 1.2s infinite alternate;
  }
  #alert-banner.show { display: flex; }
  #alert-banner .icon { font-size: 1.1rem; margin-top: 1px; }

  /* ── Cards grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 14px;
    margin-bottom: 20px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 20px 16px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
  }
  .card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
    background: var(--accent);
    border-radius: 14px 14px 0 0;
  }
  .card.co2  { --accent: var(--co2);  }
  .card.co   { --accent: var(--co);   }
  .card.temp { --accent: var(--temp); }
  .card.hum  { --accent: var(--hum);  }

  .card-label {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .card-value {
    font-family: 'Space Mono', monospace;
    font-size: 2.6rem;
    color: var(--accent);
    line-height: 1;
    transition: color 0.4s;
  }
  .card-value.alert-val { color: var(--danger) !important; }
  .card-unit { font-size: 0.8rem; color: var(--muted); margin-top: 5px; }
  .card-badge {
    display: inline-block;
    margin-top: 12px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 600;
  }
  .badge-good    { background: rgba(34,197,94,0.12);  color: var(--good);   }
  .badge-warn    { background: rgba(245,158,11,0.12); color: var(--warn);   }
  .badge-danger  { background: rgba(239,68,68,0.12);  color: var(--danger); }
  .badge-neutral { background: rgba(85,96,128,0.15);  color: var(--muted);  }

  /* ── Sparklines ── */
  .spark-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 20px;
  }
  @media (max-width: 520px) { .spark-row { grid-template-columns: 1fr; } }

  .spark-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
  }
  .spark-label {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  canvas { display: block; width: 100% !important; height: 70px !important; }

  /* ── Footer ── */
  footer {
    text-align: center;
    font-size: 0.68rem;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    margin-top: 20px;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
  @keyframes flashBorder { from{border-color:var(--danger)} to{border-color:transparent} }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot" id="live-dot"></div>
    <h1>Carbon Monitor</h1>
  </div>
  <span id="last-seen">waiting for data...</span>
</header>

<div id="alert-banner">
  <span class="icon">⚠</span>
  <span id="alert-text"></span>
</div>

<div class="grid">
  <div class="card co2">
    <div class="card-label">Carbon Dioxide</div>
    <div class="card-value" id="v-co2">—</div>
    <div class="card-unit">ppm</div>
    <div class="card-badge badge-neutral" id="b-co2">—</div>
  </div>
  <div class="card co">
    <div class="card-label">Carbon Monoxide</div>
    <div class="card-value" id="v-co">—</div>
    <div class="card-unit">ppm</div>
    <div class="card-badge badge-neutral" id="b-co">—</div>
  </div>
  <div class="card temp">
    <div class="card-label">Temperature</div>
    <div class="card-value" id="v-temp">—</div>
    <div class="card-unit">°C</div>
    <div class="card-badge badge-neutral">SCD30</div>
  </div>
  <div class="card hum">
    <div class="card-label">Humidity</div>
    <div class="card-value" id="v-hum">—</div>
    <div class="card-unit">% RH</div>
    <div class="card-badge badge-neutral">SCD30</div>
  </div>
</div>

<div class="spark-row">
  <div class="spark-card">
    <div class="spark-label">CO₂ history</div>
    <canvas id="chart-co2"></canvas>
  </div>
  <div class="spark-card">
    <div class="spark-label">CO history</div>
    <canvas id="chart-co"></canvas>
  </div>
</div>

<footer>refreshes every 5s · thresholds: CO₂ &gt;1000 ppm · CO &gt;200 ppm</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
const CO2_LIMIT = 1000;
const CO_LIMIT  = 200;

// ── Build sparklines ─────────────────────────────────────────
function makeChart(id, color) {
  const ctx = document.getElementById(id).getContext('2d');
  return new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [{
        data: [],
        borderColor: color,
        borderWidth: 1.5,
        pointRadius: 0,
        tension: 0.3,
        fill: true,
        backgroundColor: color + '18'
      }]
    },
    options: {
      animation: false,
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      scales: {
        x: { display: false },
        y: { display: false }
      }
    }
  });
}

const chartCO2 = makeChart('chart-co2', '#38bdf8');
const chartCO  = makeChart('chart-co',  '#c084fc');

function pushChart(chart, label, value) {
  chart.data.labels.push(label);
  chart.data.datasets[0].data.push(value);
  if (chart.data.labels.length > 50) {
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
  }
  chart.update();
}

// ── Badge helper ─────────────────────────────────────────────
function badge(value, limit) {
  const r = value / limit;
  if (r < 0.7)  return { label: 'Good',     cls: 'badge-good'    };
  if (r < 1.0)  return { label: 'Moderate', cls: 'badge-warn'    };
  if (r < 1.5)  return { label: 'High',     cls: 'badge-danger'  };
  return              { label: 'Danger',    cls: 'badge-danger'  };
}

// ── Fetch & render ───────────────────────────────────────────
async function refresh() {
  try {
    const res  = await fetch('/latest');
    if (res.status === 204) return;
    const d    = await res.json();

    const time = new Date(d.timestamp).toLocaleTimeString();

    document.getElementById('v-co2').textContent  = d.co2.toFixed(0);
    document.getElementById('v-co').textContent   = d.co.toFixed(1);
    document.getElementById('v-temp').textContent = d.temp.toFixed(1);
    document.getElementById('v-hum').textContent  = d.hum.toFixed(1);
    document.getElementById('last-seen').textContent = 'updated ' + time;
    document.getElementById('live-dot').className = 'logo-dot';

    // Badges
    const co2b = badge(d.co2, CO2_LIMIT);
    const cob  = badge(d.co,  CO_LIMIT);
    const bco2 = document.getElementById('b-co2');
    const bco  = document.getElementById('b-co');
    bco2.textContent = co2b.label; bco2.className = 'card-badge ' + co2b.cls;
    bco.textContent  = cob.label;  bco.className  = 'card-badge ' + cob.cls;

    // Alert values flash red
    document.getElementById('v-co2').classList.toggle('alert-val', d.co2 > CO2_LIMIT);
    document.getElementById('v-co').classList.toggle('alert-val',  d.co  > CO_LIMIT);

    // Alert banner
    const alerts = [];
    if (d.co2 > CO2_LIMIT) alerts.push('CO₂ is ' + d.co2.toFixed(0) + ' ppm — open windows');
    if (d.co  > CO_LIMIT)  alerts.push('CO is '  + d.co.toFixed(1)  + ' ppm — ventilate immediately!');
    const banner = document.getElementById('alert-banner');
    if (alerts.length) {
      document.getElementById('alert-text').textContent = alerts.join('  ·  ');
      banner.classList.add('show');
    } else {
      banner.classList.remove('show');
    }

    // Charts
    pushChart(chartCO2, time, d.co2);
    pushChart(chartCO,  time, d.co);

  } catch(e) {
    document.getElementById('last-seen').textContent = 'connection lost';
    document.getElementById('live-dot').className = 'logo-dot offline';
  }
}

// Load history on page open
fetch('/history').then(r => r.json()).then(arr => {
  arr.forEach(d => {
    const t = new Date(d.timestamp).toLocaleTimeString();
    pushChart(chartCO2, t, d.co2);
    pushChart(chartCO,  t, d.co);
  });
});

refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
